<script>
    const keywords = [
        "신뢰", "정직", "소통", "배려", "존중", "책임감", "안정감", "유머", "따뜻함", "활발함", 
        "차분함", "긍정적", "인내심", "절제", "겸손", "성실함", "목표지향", "모험심", "친절", "예의", 
        "협력", "꾸준함", "자발적", "리더십", "자기성찰", "규율", "낙관적", "현실적", "감사", "회복탄력성", 
        "열정", "희망", "창의성", "개방적", "호기심", "분석적", "비판적 사고", "유연성", "혁신성", "배우려는 태도", 
        "객관성", "지혜", "결단력", "추진력", "카리스마", "공정성", "설득력", "영향력", "MBTI성향", "취향/취미", 
        "소통방식", "외모", "비전", "가치관", "사회적조건", "경제력", "나이", "연애스타일"
    ];

    let step1Selected = [];
    let step2Selected = [];
    let final5 = [];

    // Step 1: 키워드 나열
    const grid = document.getElementById('keyword-grid');
    keywords.forEach(kw => {
        const div = document.createElement('div');
        div.className = 'chip';
        div.innerText = kw;
        div.onclick = () => {
            if (div.classList.contains('selected')) {
                div.classList.remove('selected');
                step1Selected = step1Selected.filter(i => i !== kw);
            } else if (step1Selected.length < 20) {
                div.classList.add('selected');
                step1Selected.push(kw);
            }
            document.getElementById('count-step1').innerText = `${step1Selected.length} / 20`;
            document.getElementById('to-step2').classList.toggle('hidden', step1Selected.length !== 20);
        };
        grid.appendChild(div);
    });

    // Step 2: 1:1 대진표 생성 (수정된 핵심 로직)
    function startStep2() {
        // 화면 전환
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        
        const pairGrid = document.getElementById('pair-grid');
        pairGrid.innerHTML = ""; // 기존 내용 완전 삭제
        
        // 1. 선택된 20개를 랜덤하게 섞기
        const shuffled = [...step1Selected].sort(() => Math.random() - 0.5);
        
        // 2. 정확히 10쌍(20개)을 생성하도록 강제
        for (let i = 0; i < 10; i++) {
            const item1 = shuffled[i * 2];
            const item2 = shuffled[i * 2 + 1];
            
            const pairDiv = document.createElement('div');
            pairDiv.className = 'pair';
            pairDiv.innerHTML = `
                <div class="chip" onclick="selectPair(this)">${item1}</div>
                <span class="vs">VS</span>
                <div class="chip" onclick="selectPair(this)">${item2}</div>
            `;
            pairGrid.appendChild(pairDiv);
        }
        window.scrollTo(0,0);
    }

    function selectPair(el) {
        // 같은 부모(pair) 내의 다른 칩 선택 해제
        const siblings = el.parentElement.querySelectorAll('.chip');
        siblings.forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        
        // 현재까지 선택된 총 개수 파악
        const allPairs = document.querySelectorAll('#pair-grid .pair');
        const selectedChips = document.querySelectorAll('#pair-grid .chip.selected');
        
        document.getElementById('count-step2').innerText = `선택 완료: ${selectedChips.length} / 10`;
        
        // 10쌍 모두에서 하나씩 골랐을 때만 버튼 노출
        if (selectedChips.length === 10) {
            document.getElementById('to-step3').classList.remove('hidden');
        }
    }

    // Step 3: 최종 5개 선택
    function startStep3() {
        step2Selected = Array.from(document.querySelectorAll('#pair-grid .chip.selected')).map(c => c.innerText);
        
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        
        const finalGrid = document.getElementById('final-grid');
        finalGrid.innerHTML = "";
        
        step2Selected.forEach(kw => {
            const div = document.createElement('div');
            div.className = 'chip';
            div.innerText = kw;
            div.onclick = () => {
                if (div.classList.contains('selected')) {
                    div.classList.remove('selected');
                    final5 = final5.filter(i => i !== kw);
                } else if (final5.length < 5) {
                    div.classList.add('selected');
                    final5.push(kw);
                }
                document.getElementById('count-step3').innerText = `${final5.length} / 5`;
                document.getElementById('finish-btn').classList.toggle('hidden', final5.length !== 5);
            };
            finalGrid.appendChild(div);
        });
        window.scrollTo(0,0);
    }

    function showResult() {
        document.getElementById('step3').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        document.getElementById('result-card').style.display = 'block';
        
        const display = document.getElementById('final-keywords-display');
        display.innerHTML = ""; 
        final5.forEach(kw => {
            const badge = document.createElement('div');
            badge.className = 'final-badge';
            badge.innerText = kw;
            display.appendChild(badge);
        });
        window.scrollTo(0,0);
    }

    function captureResult() {
        const card = document.getElementById('result-card');
        html2canvas(card, { 
            backgroundColor: "#f1f2f6", 
            scale: 2,
            useCORS: true // 라이브러리 외부 리소스 허용
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'ideal-type-result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
